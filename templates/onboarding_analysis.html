<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>JobMan | System Audit</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#adc6ff",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#c2c6d6",
                        "outline-variant": "#424754",
                        "secondary": "#4edea3",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(42, 42, 42, 0.4); backdrop-filter: blur(20px); }
        @keyframes scan-radar {
            0% { transform: scale(0.8); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .radar-ring { animation: scan-radar 3s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .radar-ring-delayed { animation: scan-radar 3s cubic-bezier(0.4, 0, 0.2, 1) infinite 1.5s; }
        body { background-color: #131313; color: #e5e2e1; overflow: hidden; }
    </style>
</head>
<body class="bg-[#131313] text-on-surface font-body selection:bg-primary/30 antialiased overflow-hidden">
    
    <!-- Shell Structure (Sidebar) -->
    <aside class="fixed flex flex-col left-0 top-0 h-full z-40 bg-[#1c1b1b] w-64 pt-12 border-r border-outline-variant/5">
        <div class="px-6 py-4 mb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-[#353534] flex items-center justify-center border border-outline-variant/10">
                    <span class="material-symbols-outlined text-primary">terminal</span>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-on-surface">System Admin</h3>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Phase: Audit</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <div class="flex items-center gap-3 px-4 py-3 text-primary font-bold border-r-2 border-primary bg-[#2a2a2a]/30">
                <span class="material-symbols-outlined">analytics</span>
                <span class="text-sm">Analysis</span>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 text-gray-500 opacity-50">
                <span class="material-symbols-outlined">sync</span>
                <span class="text-sm">Sync</span>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 text-gray-500 opacity-50">
                <span class="material-symbols-outlined">psychology</span>
                <span class="text-sm">Probe</span>
            </div>
        </nav>
    </aside>

    <main class="ml-64 min-h-screen flex flex-col items-center justify-center relative">
        <div class="text-center mb-12 space-y-2">
            <h2 class="text-5xl font-headline font-bold text-on-surface tracking-tighter uppercase">
                CORE SYSTEM <span class="text-primary">AUDIT</span>
            </h2>
            <p id="status-text" class="mono-font text-primary/60 text-sm tracking-[0.3em] uppercase transition-all">Status: Initializing Diagnostic Protocols</p>
        </div>

        <!-- Radar Visual -->
        <div class="relative w-80 h-80 flex items-center justify-center mb-12">
            <div class="radar-ring absolute w-full h-full rounded-full border border-primary/30"></div>
            <div class="radar-ring-delayed absolute w-full h-full rounded-full border border-primary/20"></div>
            <div class="relative z-10 w-24 h-24 rounded-full border border-primary/40 flex items-center justify-center glass-panel">
                <span class="material-symbols-outlined text-4xl text-primary">query_stats</span>
                <div class="absolute inset-0 border-2 border-transparent border-t-primary rounded-full animate-[spin_4s_linear_infinite]"></div>
            </div>
        </div>

        <!-- Progress Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl px-6">
            <div class="bg-[#1c1b1b] p-4 rounded-xl border border-outline-variant/10">
                <div class="flex items-center justify-between mb-2">
                    <span class="mono-font text-[10px] uppercase text-primary/70">Runtime</span>
                    <span id="runtime-status" class="material-symbols-outlined text-xs text-primary/30">pending</span>
                </div>
                <div class="h-1 w-full bg-[#353534] rounded-full overflow-hidden">
                    <div id="runtime-bar" class="h-full bg-primary w-0 transition-all duration-1000"></div>
                </div>
            </div>
            <div class="bg-[#1c1b1b] p-4 rounded-xl border border-outline-variant/10">
                <div class="flex items-center justify-between mb-2">
                    <span class="mono-font text-[10px] uppercase text-primary/70">Ollama Engine</span>
                    <span id="engine-status" class="material-symbols-outlined text-xs text-primary/30">pending</span>
                </div>
                <div class="h-1 w-full bg-[#353534] rounded-full overflow-hidden">
                    <div id="engine-bar" class="h-full bg-primary w-0 transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <!-- Global BG -->
        <div class="fixed inset-0 pointer-events-none z-[-1]">
            <div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-primary/5 blur-[150px] rounded-full"></div>
        </div>
    </main>

    <script>
        async function runAudit() {
            const statusText = document.getElementById('status-text');
            const bars = {
                runtime: document.getElementById('runtime-bar'),
                engine: document.getElementById('engine-bar')
            };
            const icons = {
                runtime: document.getElementById('runtime-status'),
                engine: document.getElementById('engine-status')
            };

            // Step 1: Python Runtime
            statusText.innerText = "Status: Checking Runtime Environment";
            bars.runtime.style.width = "40%";
            await new Promise(r => setTimeout(r, 800));
            bars.runtime.style.width = "100%";
            icons.runtime.innerText = "check_circle";
            icons.runtime.classList.replace('text-primary/30', 'text-secondary');

            // Step 2: Ollama Engine
            statusText.innerText = "Status: Probing Intelligence Engine";
            bars.engine.style.width = "30%";
            
            try {
                const resp = await fetch('/api/setup/audit');
                const data = await resp.json();
                
                await new Promise(r => setTimeout(r, 1000));
                bars.engine.style.width = "100%";
                
                if (data.is_ollama_alive) {
                    icons.engine.innerText = "check_circle";
                    icons.engine.classList.replace('text-primary/30', 'text-secondary');
                    statusText.innerText = "Status: Core Systems Verified";
                } else {
                    icons.engine.innerText = "error";
                    icons.engine.classList.replace('text-primary/30', 'text-red-400');
                    statusText.innerText = "Status: Engine Core Not Found";
                }
                
                // New Flow: Always proceed to Intelligence Probe (Screen 3)
                setTimeout(() => window.location.href = '/onboarding/probe', 1500);
            } catch (e) {
                statusText.innerText = "Status: Diagnostic Failure";
            }
        }

        window.onload = runAudit;
    </script>
</body>
</html>
