<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>JobMan | Environment Sync</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#adc6ff",
                        "primary-container": "#4d8eff",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#c2c6d6",
                        "outline-variant": "#424754",
                        "secondary": "#4edea3",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-lowest": "#0e0e0e",
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "mono": ["JetBrains Mono"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(42, 42, 42, 0.6); backdrop-filter: blur(20px); }
        .progress-glow { box-shadow: 0 0 15px rgba(173, 198, 255, 0.4); }
    </style>
</head>
<body class="bg-[#131313] text-on-surface font-body selection:bg-primary/30 antialiased overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="fixed flex flex-col left-0 top-0 h-full w-64 z-40 bg-[#1c1b1b] pt-12 border-r border-[#424754]/15">
        <div class="px-6 py-4 mb-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-[#353534] flex items-center justify-center border border-outline-variant/10">
                    <span class="material-symbols-outlined text-primary">terminal</span>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-on-surface">System Admin</h3>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Phase: Onboarding</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <div class="flex items-center gap-3 px-4 py-3 text-gray-500 opacity-50">
                <span class="material-symbols-outlined">analytics</span>
                <span class="text-sm">Analysis</span>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 text-primary font-bold border-r-2 border-primary bg-[#2a2a2a]/50">
                <span class="material-symbols-outlined">sync</span>
                <span class="text-sm">Environment</span>
            </div>
            <div class="flex items-center gap-3 px-4 py-3 text-gray-500 opacity-50">
                <span class="material-symbols-outlined">psychology</span>
                <span class="text-sm">Probe</span>
            </div>
        </nav>
    </aside>

    <main class="ml-64 pt-20 h-screen flex flex-col items-center justify-center relative p-12">
        <div class="max-w-4xl w-full space-y-12">
            <!-- Header -->
            <section class="space-y-4 text-center">
                <div class="flex items-center justify-center gap-2 text-primary uppercase tracking-[0.2em] font-label text-xs">
                    <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                    Live Installation Sequence
                </div>
                <h1 id="main-status-heading" class="text-5xl font-headline font-bold tracking-tighter text-on-surface uppercase">
                    INITIALIZING SYSTEM SYNC
                </h1>
            </section>

            <!-- Progress Bar -->
            <section class="space-y-6">
                <div class="relative w-full h-12 bg-surface-container-lowest rounded-full overflow-hidden border border-outline-variant/10">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-primary-container to-primary progress-glow w-0 flex items-center justify-end px-4 relative transition-all duration-300">
                        <span id="progress-text" class="text-[#002e6a] font-headline font-bold text-lg">0%</span>
                    </div>
                </div>
                <div class="flex justify-between items-center text-[10px] font-mono text-gray-500 uppercase tracking-widest">
                    <span id="speed-label">Bitrate: Fetching...</span>
                    <span id="status-label" class="text-primary italic">Handshaking...</span>
                    <span id="time-label">ETA: Calculating...</span>
                </div>
            </section>

            <!-- Console Log -->
            <section class="space-y-4">
                <div class="flex items-center justify-between">
                    <h3 class="font-label text-sm text-on-surface-variant flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">terminal</span>
                        Live Activity Log
                    </h3>
                </div>
                <div id="log-window" class="bg-surface-container-lowest p-6 rounded-xl h-64 overflow-y-auto font-mono text-xs space-y-2 border border-outline-variant/5 scroll-smooth">
                    <!-- Logs stream here -->
                </div>
            </section>

            <!-- Action -->
            <section class="flex flex-col items-center">
                <button id="next-btn" class="group relative px-12 py-5 rounded-xl bg-surface-container-high border border-outline-variant/20 text-gray-500 cursor-not-allowed overflow-hidden opacity-50 transition-all font-headline font-bold tracking-widest text-sm uppercase" disabled>
                    PROCEED TO DEPLOYMENT
                </button>
                <p id="hint-text" class="mt-4 text-[10px] font-mono text-gray-600 uppercase tracking-widest">Awaiting total parity (100%)</p>
            </section>
        </div>
    </main>

    <script>
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const logWindow = document.getElementById('log-window');
        const statusLabel = document.getElementById('status-label');
        const mainHeading = document.getElementById('main-status-heading');
        const nextBtn = document.getElementById('next-btn');
        const hintText = document.getElementById('hint-text');

        function addLog(msg, type = 'INFO') {
            const div = document.createElement('div');
            div.className = "flex gap-4 opacity-0 transition-opacity duration-300";
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            let color = "text-primary";
            if (type === 'OK') color = "text-secondary";
            if (type === 'ERROR') color = "text-red-400";

            div.innerHTML = `<span class="text-gray-600">[${time}]</span> <span class="${color} font-bold">[${type}]</span> <span class="text-on-surface-variant">${msg}</span>`;
            logWindow.appendChild(div);
            setTimeout(() => div.classList.replace('opacity-0', 'opacity-100'), 10);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        const evtSource = new EventSource("/api/setup/events");

        evtSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.status) {
                statusLabel.innerText = data.status;
                mainHeading.innerText = data.status.toUpperCase();
                addLog(data.status, 'SYNC');
            }

            if (data.progress !== undefined) {
                const p = Math.floor(data.progress);
                progressBar.style.width = p + "%";
                progressText.innerText = p + "%";

                if (p >= 100) {
                    nextBtn.disabled = false;
                    nextBtn.classList.remove('cursor-not-allowed', 'opacity-50', 'bg-surface-container-high', 'text-gray-500', 'border-outline-variant/20');
                    nextBtn.classList.add('bg-primary', 'text-[#002e6a]', 'shadow-lg', 'shadow-primary/20', 'hover:opacity-90');
                    hintText.innerText = "System Parity Reached";
                    hintText.classList.add('text-secondary');
                    addLog("Installation sequence complete. Optimal hardware baseline detected.", "OK");
                }
            }
        };

        nextBtn.addEventListener('click', () => {
            window.location.href = '/onboarding/deployment';
        });

        // Trigger installation on load if not already running
        window.onload = () => {
             addLog("Initializing secure handshake with deployment nodes...", "INFO");
        };
    </script>
</body>
</html>
